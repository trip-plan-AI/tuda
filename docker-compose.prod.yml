services:
  db-seed:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: travel-planner-db-seed
    profiles: ['seed']
    restart: 'no'
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    command: ['node', 'apps/api/dist/src/db/seed.js']
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: travel-planner-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      FRONTEND_URL: https://tuda.pro
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REDIS_URL: ${REDIS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    expose:
      - '3001'
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: travel-planner-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - '3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "http=require(''http'');req=http.get(''http://127.0.0.1:3000/'',res=>process.exit(res.statusCode<500?0:1));req.on(''error'',()=>process.exit(1));"',
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      api:
        condition: service_started
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: travel-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: travel-planner-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
