name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  predeploy-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      base_sha: ${{ steps.sha.outputs.base_sha }}
      head_sha: ${{ steps.sha.outputs.head_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Compute push SHAs
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile

      - name: Run predeploy guard
        env:
          BASE_SHA: ${{ steps.sha.outputs.base_sha }}
          HEAD_SHA: ${{ steps.sha.outputs.head_sha }}
          LOG_DIR: ./artifacts/predeploy
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/ci/predeploy-guard.sh
          ./scripts/ci/predeploy-guard.sh

      - name: Upload predeploy logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: predeploy-guard-logs
          path: artifacts/predeploy
          if-no-files-found: warn

  deploy:
    needs: predeploy-guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          install -m 700 -d ~/.ssh
          cat > ~/.ssh/id_ed25519 << 'KEY'
          ${{ secrets.DEPLOY_SSH_KEY }}
          KEY
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          EXPECTED_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes "$DEPLOY_USER@$DEPLOY_HOST" "EXPECTED_SHA=$EXPECTED_SHA bash -se" << 'EOF'
          set -euo pipefail
          export GIT_SSH_COMMAND='ssh -i ~/.ssh/github_pull_ci_ed25519 -o IdentitiesOnly=yes'

          echo "[deploy] expected commit: $EXPECTED_SHA"
          cd /opt/apps/travel-planner
          echo "[deploy] current commit before pull: $(git rev-parse HEAD)"
          git pull --ff-only origin main
          CURRENT_SHA="$(git rev-parse HEAD)"
          echo "[deploy] current commit after pull: $CURRENT_SHA"
          if [ "$CURRENT_SHA" != "$EXPECTED_SHA" ]; then
            echo "[deploy][error] commit mismatch: expected=$EXPECTED_SHA actual=$CURRENT_SHA"
            exit 1
          fi

          echo "[deploy] docker services"
          docker compose -f docker-compose.prod.yml config --services

          echo "[deploy] ensure db is running before backup"
          docker compose -f docker-compose.prod.yml up -d db
          docker compose -f docker-compose.prod.yml ps db
          docker compose -f docker-compose.prod.yml exec --interactive=false -T db sh -lc 'pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

          echo "[deploy] start db backup"
          mkdir -p /opt/apps/travel-planner/backups
          BACKUP_FILE="/opt/apps/travel-planner/backups/db_$(date +%Y%m%d_%H%M%S).sql"
          if docker compose -f docker-compose.prod.yml exec --interactive=false -T db sh -lc 'pg_dump -U "$POSTGRES_USER" -d "$POSTGRES_DB"' > "$BACKUP_FILE"; then
            echo "[deploy] db backup saved to: $BACKUP_FILE"
          else
            echo "[deploy][warn] db backup failed, continue deploy"
          fi

          echo "[deploy] run db:push"
          if COREPACK_ENABLE_DOWNLOAD_PROMPT=0 docker compose -f docker-compose.prod.yml run --rm -T api pnpm --filter api db:push --force < /dev/null; then
            echo "[deploy] db:push finished"
          else
            echo "[deploy][warn] db:push returned non-zero, continue deploy"
          fi

          echo "[deploy] public schema (tables and columns)"
          if docker compose -f docker-compose.prod.yml exec --interactive=false -T db sh -lc 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -c "SELECT c.table_name, c.column_name, c.data_type, c.is_nullable FROM information_schema.columns AS c WHERE c.table_schema = '\''public'\'' ORDER BY c.table_name, c.ordinal_position;"'; then
            echo "[deploy] schema log finished"
          else
            echo "[deploy][warn] schema log failed, continue deploy"
          fi

          docker compose -f docker-compose.prod.yml up -d --build
          echo "[deploy] docker images"
          docker compose -f docker-compose.prod.yml images
          echo "[deploy] docker status"
          docker compose -f docker-compose.prod.yml ps
          EOF
